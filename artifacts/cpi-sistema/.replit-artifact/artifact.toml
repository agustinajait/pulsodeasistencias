kind = "web"
previewPath = "/"
title = "CPI Norte · Sistema de Asistencia"
version = "1.0.0"
id = "artifacts/cpi-sistema"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19058

[services.development]
run = "pnpm --filter @workspace/cpi-sistema run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cpi-sistema", "run", "build" ]
publicDir = "artifacts/cpi-sistema/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19058"
BASE_PATH = "/"
