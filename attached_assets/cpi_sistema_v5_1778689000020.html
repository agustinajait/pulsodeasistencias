<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CPI Norte · Sistema Integral</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EDE6;--s:#FFF;--s2:#E8E4DC;--s3:#DEDAD0;
  --bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.13);
  --tx:#13110A;--tx2:#6B6458;--tx3:#A39C90;
  --g:#1C6E44;--gl:#E3F2EB;
  --r:#B82C24;--rl:#FCECEA;
  --a:#8C520A;--al:#FEF0DF;
  --b:#1A4D8C;--bl:#E5EDF8;
  --pu:#5A3FA8;--pul:#EDEAF8;
  --wa:#25D366;--wa2:#1AAB53;
  --R:14px;--Rs:9px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --f:'Sora',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.screen{display:none}.screen.on{display:flex}
a{text-decoration:none;color:inherit}

/* LOGIN */
#sl{min-height:100vh;align-items:center;justify-content:center;padding:1rem;flex-direction:column;
  background:radial-gradient(circle at 20% 20%,rgba(28,110,68,.08) 0%,transparent 50%),
             radial-gradient(circle at 80% 80%,rgba(26,77,140,.06) 0%,transparent 50%) var(--bg)}
.lw{width:100%;max-width:400px}
.lh{text-align:center;margin-bottom:1.5rem}
.li{width:58px;height:58px;background:var(--g);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.75rem;box-shadow:0 4px 16px rgba(28,110,68,.3)}
.lt{font-size:22px;font-weight:700}.ls{font-size:13px;color:var(--tx2);margin-top:4px}
.slist{display:flex;flex-direction:column;gap:8px}
.sbtn{display:flex;align-items:center;gap:14px;background:var(--s);border:1.5px solid var(--bd2);border-radius:var(--R);padding:14px 16px;cursor:pointer;font-family:var(--f);color:var(--tx);text-align:left;transition:all .15s;width:100%;box-shadow:var(--sh)}
.sbtn:hover{border-color:var(--g);transform:translateY(-1px)}
.sbtn.adm{background:var(--tx);color:#fff;border-color:var(--tx)}.sbtn.adm:hover{background:var(--g);border-color:var(--g)}
.se{font-size:24px;flex-shrink:0}.sn{font-size:14px;font-weight:600}.sr{font-size:12px;color:var(--tx3);margin-top:1px}.adm .sr{color:rgba(255,255,255,.5)}
.ldiv{text-align:center;font-size:12px;color:var(--tx3);margin:3px 0;display:flex;align-items:center;gap:8px}
.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--bd2)}

/* APP SHELL */
#sa{min-height:100vh;flex-direction:column}
.tb{background:var(--s);border-bottom:1px solid var(--bd);padding:0 1.25rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.tbl{display:flex;align-items:center;gap:10px}
.tbd{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 0 3px rgba(28,110,68,.2)}
.tbt{font-size:14px;font-weight:700}
.tbr{display:flex;align-items:center;gap:8px}
.tbu{font-size:12px;font-weight:500;color:var(--tx2);background:var(--s2);padding:4px 10px;border-radius:99px}
.lob{font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:var(--f);padding:4px 8px;border-radius:6px}
.lob:hover{background:var(--s2);color:var(--tx)}
.main{flex:1;padding:1rem;max-width:900px;margin:0 auto;width:100%;padding-bottom:5.5rem}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--s2);padding:3px;border-radius:var(--Rs);margin-bottom:1.1rem}
.tab{flex:1;text-align:center;padding:7px 4px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;border:none;background:none;font-family:var(--f);color:var(--tx3);transition:all .15s;white-space:nowrap}
.tab.on{background:var(--s);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* CARD */
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--R);padding:1.1rem;margin-bottom:.9rem;box-shadow:var(--sh)}
.cf{padding:0;overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px}
.st{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.7rem}

/* METRICS */
.mx{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:.9rem}
.mc{background:var(--s);border:1px solid var(--bd);border-radius:var(--Rs);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.mv{font-size:22px;font-weight:700;line-height:1}.ml{font-size:10px;color:var(--tx2);margin-top:4px;font-weight:500}
.mg{color:var(--g)}.mr{color:var(--r)}.ma{color:var(--a)}.mb{color:var(--b)}.mpu{color:var(--pu)}

/* BADGE */
.bx{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.bg{background:var(--gl);color:var(--g)}.br{background:var(--rl);color:var(--r)}.ba{background:var(--al);color:var(--a)}.bb{background:var(--bl);color:var(--b)}.bn{background:var(--s2);color:var(--tx2)}.bpu{background:var(--pul);color:var(--pu)}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--Rs);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--f);transition:all .15s}
.bp{background:var(--g);color:#fff;box-shadow:0 2px 8px rgba(28,110,68,.25)}.bp:hover{background:#155a38}.bp:disabled{opacity:.4;cursor:not-allowed}
.bg2{background:none;border:1.5px solid var(--bd2);color:var(--tx)}.bg2:hover{background:var(--s2)}
.bw{background:var(--wa);color:#fff;box-shadow:0 2px 8px rgba(37,211,102,.3)}.bw:hover{background:var(--wa2)}
.br2{background:var(--r);color:#fff}.br2:hover{opacity:.88}
.bsm{padding:5px 10px;font-size:12px}.bxsm{padding:3px 8px;font-size:11px}

/* NINO ROW */
.nr{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--bd);gap:9px;transition:background .1s;cursor:pointer}
.nr:last-child{border-bottom:none}.nr:hover{background:var(--bg)}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.av-b{background:var(--bl);color:var(--b)}.av-g{background:var(--gl);color:var(--g)}.av-r{background:var(--rl);color:var(--r)}.av-pu{background:var(--pul);color:var(--pu)}
.ni{flex:1;min-width:0}
.na{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nn{font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dcs{display:flex;gap:3px;flex-shrink:0}
.dc{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.dp{background:var(--gl);color:var(--g)}.da{background:var(--rl);color:var(--r)}.dm{background:var(--pul);color:var(--pu)}.dn{background:var(--s2);color:var(--tx3)}

/* TOGGLE P/A/M */
.tg{display:flex;border:1.5px solid var(--bd2);border-radius:8px;overflow:hidden;flex-shrink:0}
.tgb{padding:5px 11px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--tx3);font-family:var(--f);transition:all .12s}
.tp{background:var(--g);color:#fff}.ta{background:var(--r);color:#fff}.tm{background:var(--pu);color:#fff}

/* NOTA */
.nota-inp{width:100%;padding:6px 10px;border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;font-family:var(--f);color:var(--tx);background:var(--bg);resize:none;transition:border .15s}
.nota-inp:focus{outline:none;border-color:var(--g);background:var(--s)}

/* SALA BAR */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:var(--Rs);padding:13px 15px;box-shadow:var(--sh)}
.sh2{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:13px;font-weight:700}
.sb{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.sf{height:100%;border-radius:3px;transition:width .5s}
.sn2{display:flex;gap:10px;font-size:12px;font-weight:500}

/* ALERTA */
.ac{background:var(--s);border:1px solid var(--bd);border-left:4px solid var(--r);border-radius:var(--Rs);padding:13px;margin-bottom:8px;box-shadow:var(--sh)}
.ac.aw{border-left-color:var(--a)}.ac.ok{border-left-color:var(--g)}
.ah{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.an{font-size:14px;font-weight:700}.am{font-size:12px;color:var(--tx2);margin-top:3px;line-height:1.5}
.wb{background:#E8F9EE;border-radius:0 12px 12px 12px;padding:11px 13px;font-size:13px;line-height:1.65;color:#1A3A24;white-space:pre-wrap;margin:10px 0;border:1px solid rgba(30,120,70,.12)}
.aa{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* SEARCH */
.srch{position:relative;margin-bottom:.9rem}
.srch input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--bd2);border-radius:var(--Rs);font-size:13px;font-family:var(--f);background:var(--s);color:var(--tx);transition:border .15s;font-weight:500}
.srch input:focus{outline:none;border-color:var(--g)}
.srch::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}

/* BANNER */
.bn2{border-radius:var(--Rs);padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;gap:8px;border:1px solid}
.bwn{background:var(--al);color:var(--a);border-color:rgba(140,82,10,.15)}
.bok{background:var(--gl);color:var(--g);border-color:rgba(28,110,68,.15)}
.bin{background:var(--bl);color:var(--b);border-color:rgba(26,77,140,.15)}
.brd{background:var(--rl);color:var(--r);border-color:rgba(184,44,36,.15)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mo.on{display:flex}
.md{background:var(--s);border-radius:var(--R) var(--R) 0 0;padding:1.25rem;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15)}
.mdt{font-size:15px;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.mdc{font-size:22px;cursor:pointer;color:var(--tx3);background:none;border:none;line-height:1}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.ff input,.ff select,.ff textarea{padding:9px 11px;border:1.5px solid var(--bd2);border-radius:var(--Rs);font-size:13px;font-family:var(--f);color:var(--tx);background:var(--s);transition:border .15s}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--g)}
.ff input[readonly]{background:var(--s2);color:var(--tx2)}

/* STICKY BTN */
.sbot{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);border-top:1px solid var(--bd);padding:.75rem 1rem;z-index:100;display:flex;gap:8px;justify-content:center;backdrop-filter:blur(8px)}
.sbot .btn{flex:1;max-width:340px;justify-content:center;font-size:14px;padding:11px 18px}

/* CALENDARIO */
.cal-wrap{background:var(--s);border:1px solid var(--bd);border-radius:var(--R);padding:1.1rem;margin-bottom:.9rem;box-shadow:var(--sh)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-title{font-size:15px;font-weight:700}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--bd2);background:var(--s);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav button:hover{background:var(--s2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--tx3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid transparent;position:relative}
.cal-day:hover{border-color:var(--bd2);background:var(--s2)}
.cal-day.vacio,.cal-day.finde{opacity:0;pointer-events:none}
.cal-day.hoy{border-color:var(--g)!important}
.cal-day.cd-p{background:var(--gl);color:var(--g)}.cal-day.cd-a{background:var(--rl);color:var(--r)}.cal-day.cd-m{background:var(--pul);color:var(--pu)}.cal-day.cd-mix{background:var(--al);color:var(--a)}.cal-day.cd-n{background:var(--s2);color:var(--tx2)}
.cal-day .cd-dot{width:5px;height:5px;border-radius:50%;background:var(--b);position:absolute;bottom:3px;right:3px}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.75rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* FICHA NIÑO */
.ficha-section{background:var(--s2);border-radius:var(--Rs);padding:12px 14px;margin-bottom:10px}
.ficha-section h4{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.ficha-row{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
.ficha-label{font-size:11px;color:var(--tx3);font-weight:500;min-width:80px;flex-shrink:0}
.ficha-val{font-size:13px;color:var(--tx);font-weight:500;flex:1}

/* LLAMADOS */
.llamado-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--Rs);padding:10px 12px;margin-bottom:6px}
.llamado-fecha{font-size:11px;font-family:var(--fm);color:var(--tx3);margin-bottom:3px}
.llamado-obs{font-size:13px;color:var(--tx)}
.llamado-quien{font-size:11px;color:var(--g);font-weight:600;margin-top:3px}

/* DOCS */
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.doc-item:last-child{border-bottom:none}
.doc-icon{font-size:20px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-meta{font-size:11px;color:var(--tx3)}
.doc-upload{border:2px dashed var(--bd2);border-radius:var(--Rs);padding:1.5rem;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.doc-upload:hover{border-color:var(--g);background:var(--gl)}
.doc-upload input{display:none}

/* SYNC */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-g{background:var(--g);animation:pulse 2s infinite}
.sync-r{background:var(--r)}
.sync-a{background:var(--a)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOPE BAR */
.tope-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tope-label{font-size:12px;font-weight:600;min-width:55px}
.tope-track{flex:1;height:10px;background:var(--s2);border-radius:5px;overflow:hidden;position:relative}
.tope-fill{height:100%;border-radius:5px;transition:width .5s}
.tope-nums{font-size:12px;font-family:var(--fm);font-weight:500;min-width:60px;text-align:right}

/* TOAST */
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--tx);color:#fff;padding:9px 20px;border-radius:var(--Rs);font-size:13px;font-weight:600;opacity:0;transition:all .22s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* MOTIVOS AUSENCIA */
.motivo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 10px}
.motivo-btn{padding:8px 6px;border-radius:var(--Rs);border:1.5px solid var(--bd2);background:var(--s);cursor:pointer;font-family:var(--f);font-size:11px;font-weight:600;text-align:center;transition:all .15s;color:var(--tx2)}
.motivo-btn:hover{border-color:var(--a);background:var(--al);color:var(--a)}
.motivo-btn.sel{border-color:var(--a);background:var(--al);color:var(--a)}

/* WA TRACKING */
.wa-track-card{background:var(--s);border:1px solid var(--bd);border-left:4px solid var(--wa);border-radius:var(--Rs);padding:12px 14px;margin-bottom:8px}
.wa-track-card.respondio{border-left-color:var(--g)}
.wa-track-card.no-resp{border-left-color:var(--r)}
.wa-estado{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.wa-resp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:8px 0}
.wa-resp-btn{padding:7px 6px;border-radius:var(--Rs);border:1.5px solid var(--bd2);background:var(--s);cursor:pointer;font-family:var(--f);font-size:11px;font-weight:600;text-align:center;transition:all .15s;color:var(--tx2)}
.wa-resp-btn:hover{border-color:var(--g);background:var(--gl);color:var(--g)}
.wa-resp-btn.sel{border-color:var(--g);background:var(--gl);color:var(--g)}
.wa-resp-btn.sel-r{border-color:var(--r);background:var(--rl);color:var(--r)}

/* EGRESO / BAJA */
.egreso-tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.egreso-btn{padding:10px 8px;border-radius:var(--Rs);border:1.5px solid var(--bd2);background:var(--s);cursor:pointer;font-family:var(--f);font-size:12px;font-weight:600;text-align:center;transition:all .15s;color:var(--tx2)}
.egreso-btn:hover{border-color:var(--r);background:var(--rl);color:var(--r)}
.egreso-btn.sel{border-color:var(--r);background:var(--rl);color:var(--r)}
.egreso-btn.pase{border-color:var(--b)}.egreso-btn.pase:hover,.egreso-btn.pase.sel{border-color:var(--b);background:var(--bl);color:var(--b)}

/* CPIS PANEL */
.cpis-panel{background:var(--bl);border:1.5px solid var(--b);border-radius:var(--Rs);padding:12px 14px;margin-top:10px}
.cpis-title{font-size:12px;font-weight:700;color:var(--b);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cpis-field{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(26,77,140,.1)}
.cpis-field:last-child{border-bottom:none}
.cpis-label{font-size:11px;color:var(--b);font-weight:600;min-width:90px;flex-shrink:0}
.cpis-val{font-size:13px;font-weight:500;flex:1}
.cpis-copy{padding:3px 8px;border-radius:5px;border:1px solid var(--b);background:var(--s);color:var(--b);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f);flex-shrink:0}
.cpis-copy:hover{background:var(--b);color:#fff}

/* LISTA BAJAS */
.baja-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);gap:10px}
.baja-row:last-child{border-bottom:none}
.baja-fecha{font-size:11px;font-family:var(--fm);color:var(--tx3);flex-shrink:0;min-width:70px}
.baja-tipo{flex-shrink:0}

/* LOADING */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:1.5rem;color:var(--tx3);font-size:13px}

/* EMPTY */
.empty{text-align:center;padding:2rem 1rem;color:var(--tx2);font-size:13px;font-weight:500}

/* MOBILE */
@media(max-width:580px){
  .mx{grid-template-columns:repeat(3,1fr)}

  if(!el) return;
  const cls={ok:'sync-g',err:'sync-r',pend:'sync-a'}[st]||'sync-r';
  el.innerHTML=`<span class="sync-dot ${cls}"></span>`;
}
function jsonp(action,params={}){
  return new Promise(res=>{
    if(!SCRIPT_URL){res(null);return;}
    setSS('pend');
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];document.getElementById(cb)?.remove();setSS(d?.ok?'ok':'err');res(d);};
    const s=document.createElement('script');
    s.id=cb;
    s.src=SCRIPT_URL+'?'+new URLSearchParams({action,callback:cb,...params}).toString();
    s.onerror=()=>{delete window[cb];s.remove();setSS('err');res(null);};
    document.head.appendChild(s);
    setTimeout(()=>{delete window[cb];s.remove();setSS('err');res(null);},12000);
  });
}
async function api(action,params={}){return jsonp(action,params);}

function marcarCpisCargado(idx,nid){

  if(n) n.cpisCargado=true;
  showToast('✓ Marcado como cargado en cpis.com.ar');
  admBajas();
}

function renderCalendario(sala){
  const ninos=NINOS.filter(n=>n.sala===sala&&n.activo);
  const anio=calMes.getFullYear(), mes=calMes.getMonth();
  const mesStr=calMes.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const diasMes=new Date(anio,mes+1,0).getDate();
  const primerDow=new Date(anio,mes,1).getDay();
  const offset=primerDow===0?6:primerDow-1;

  const dows=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let grid=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++) grid+=`<div class="cal-day vacio"></div>`;

  for(let d=1;d<=diasMes;d++){
    const fecha=`${anio}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(anio,mes,d).getDay();
    if(dow===0||dow===6){grid+=`<div class="cal-day finde"><span>${d}</span></div>`;continue;}
    const esHoy=fecha===HOY;
    const p=ninos.filter(n=>n.dias[fecha]==='P').length;
    const a=ninos.filter(n=>(n.dias[fecha])==='A').length;
    const m=ninos.filter(n=>n.mer&&n.mer[fecha]).length;
    const total=p+a+m;
    const pct=total?Math.round(p/total*100):null;
    const hayNota=ninos.some(n=>n.notas?.[fecha]);
    let cls='cd-n';
    if(total>0) cls=p>0&&a===0?'cd-p':a>0&&p===0?'cd-a':'cd-mix';
    grid+=`<div class="cal-day ${cls} ${esHoy?'hoy':''}" onclick="abrirDia('${fecha}',${sala})">
      <span style="font-size:12px;font-weight:700">${d}</span>
      ${pct!==null?`<span style="font-size:9px;opacity:.8">${pct}%</span>`:''}
      ${hayNota||ninos.some(n=>n.motivos?.[fecha])?'<div class="cd-dot"></div>':''}
    </div>`;
  }

  const totP=ninos.reduce((s,n)=>s+Object.values(n.dias).filter(v=>v==='P').length,0);
  const totA=ninos.reduce((s,n)=>s+Object.values(n.dias).filter(v=>v==='A').length,0);
  const totM=ninos.reduce((s,n)=>s+Object.keys(n.mer||{}).filter(d=>n.mer[d]).length,0);

  return `<div class="cal-wrap">
    <div class="cal-header">
      <div class="cal-title">${mesStr}</div>
      <div class="cal-nav">
        <button onclick="calMes=new Date(calMes.getFullYear(),calMes.getMonth()-1,1);renderMaestra()">‹</button>
        <button onclick="calMes=new Date();renderMaestra()">Hoy</button>
        <button onclick="calMes=new Date(calMes.getFullYear(),calMes.getMonth()+1,1);renderMaestra()">›</button>
      </div>
    </div>
    <div class="cal-legend">
      <div class="leg"><div class="leg-dot" style="background:var(--gl)"></div>Presentes</div>
      <div class="leg"><div class="leg-dot" style="background:var(--rl)"></div>Ausentes</div>
      <div class="leg"><div class="leg-dot" style="background:var(--pul)"></div>Mercadería</div>
      <div class="leg"><div class="leg-dot" style="background:var(--al)"></div>Mixto</div>
      <div class="leg"><div class="leg-dot" style="background:var(--bl)"></div>Tiene nota</div>
    </div>
    <div class="cal-grid">${grid}</div>
    <div style="display:flex;gap:14px;margin-top:10px;font-size:12px;font-weight:600">
      <span style="color:var(--g)">P total: ${totP}</span>
      <span style="color:var(--r)">A total: ${totA}</span>
      <span style="color:var(--pu)">M total: ${totM}</span>
    </div>
  </div>`;
}

function abrirDia(fecha,sala){
  diaFecha=fecha;diaSala=sala;
  const ninos=NINOS.filter(n=>n.sala===sala&&n.activo);
  const d=new Date(fecha+'T12:00:00');
  document.getElementById('dia-title').textContent=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('dia-body').innerHTML=ninos.map(n=>{
    const v=n.dias[fecha]||'';
    const nota=n.notas[fecha]||'';
    const ini=((n.ap[0]||'')+(n.nb[0]||'')).toUpperCase();
    return `<div style="padding:9px 14px;border-bottom:1px solid var(--bd)">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:${v&&v!=='P'||nota?'6px':'0'}">
        <div class="av av-b" style="flex-shrink:0">${ini}</div>
        <div class="ni"><div class="na">${n.ap}</div><div class="nn">${n.nb}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="tg">
            <button class="tgb ${v==='P'?'tp':''}" onclick="marcarDia(${n.id},'${fecha}','P')">P</button>
            <button class="tgb ${v==='A'?'ta':''}" onclick="marcarDia(${n.id},'${fecha}','A')">A</button>
          </div>
          <button onclick="marcarMerDia(${n.id},'${fecha}')" title="Mercadería" style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--bd2);background:${n.mer&&n.mer['${fecha}']?'var(--pu)':'var(--s)'};color:${n.mer&&n.mer['${fecha}']?'#fff':'var(--tx3)'};font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all .12s">M</button>
        </div>
      </div>
      ${v==='A'?`<div style="margin-top:6px">
        <div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Motivo</div>
        <div class="motivo-grid">
          ${['🤒 Enfermedad','👨‍👩‍👧 Logística','🏥 Turno médico','🌧️ Clima','📝 Otros'].map(m=>{
            const mot=n.motivos&&n.motivos['${fecha}'];
            return `<button class="motivo-btn ${mot===m?'sel':''}" onclick="guardarMotivoDia(${n.id},'${fecha}','${m}')">${m}</button>`;
          }).join('')}
        </div>
        <input type="text" class="nota-inp" id="nota-d-${n.id}" placeholder="Anotación adicional..."
          value="${nota}" maxlength="180" oninput="guardarNota(${n.id},'${fecha}',this.value)">
      </div>`:''}
    </div>`;
  }).join('');
  oM('m-dia');
}

function marcarDia(nid,fecha,val){
  const n=NINOS.find(x=>x.id===nid);
  if(!n){return;}
  n.dias[fecha]=val;
  const notaEl=document.getElementById(`nota-d-${nid}`);
  if(notaEl) notaEl.style.display=val&&val!=='P'?'block':'none';
  abrirDia(fecha,diaSala);
}
function marcarMerDia(nid,fecha){
  const n=NINOS.find(x=>x.id===nid);
  if(!n) return;
  if(!n.mer) n.mer={};
  n.mer[fecha]=!n.mer[fecha];
  abrirDia(fecha,diaSala);
}
function guardarMotivoDia(nid,fecha,motivo){
  const n=NINOS.find(x=>x.id===nid);
  if(!n) return;
  if(!n.motivos) n.motivos={};
  n.motivos[fecha]=n.motivos[fecha]===motivo?'':motivo;
  abrirDia(fecha,diaSala);
}

function subirDoc(nid,input){
  const n=NINOS.find(x=>x.id===nid);
  if(!n||!input.files.length) return;
  Array.from(input.files).forEach(file=>{
    const ext=file.name.split('.').pop().toLowerCase();
    const tipo=ext==='pdf'?'pdf':['jpg','jpeg','png'].includes(ext)?'img':'otro';
    // En producción aquí iría la subida a Drive
    // Por ahora guardamos el nombre y creamos URL local
    const url=URL.createObjectURL(file);
    n.docs.push({nombre:file.name, tipo, url, fecha:HOY});
  });
  showToast(`${input.files.length} documento${input.files.length!==1?'s':''} cargado${input.files.length!==1?'s':''}`);
  abrirFicha(nid);
}

function verDoc(url){window.open(url,'_blank');}

function guardarLlamado(){
  const nid=parseInt(document.getElementById('ll-nid').value);
  const n=NINOS.find(x=>x.id===nid);
  if(!n) return;
  const ll={
    fecha: document.getElementById('ll-fecha').value,
    quien: document.getElementById('ll-quien').value.trim(),
    motivo: document.getElementById('ll-motivo').value,
    obs: document.getElementById('ll-obs').value.trim(),
    resultado: document.getElementById('ll-resultado').value,
  };
  if(!n.llamados) n.llamados=[];
  n.llamados.unshift(ll);
  n.est_asist=ll.resultado;
  cM('m-llamado');
  // Sync Sheets
  api('saveInasist',{fecha:ll.fecha,hora:new Date().toTimeString().slice(0,5),ap:n.ap,nb:n.nb,sala:n.sala,motivo:ll.motivo,obs:ll.obs,fam:`${n.fam_ap} ${n.fam_nb}`.trim(),cargo:ll.quien});
  showToast('Contacto registrado ✓');
  if(fichaId===nid) abrirFicha(nid);
}

        </div>

          ${[
            {t:'✓ Vuelve mañana',c:'g'},

function renderAdmin(tab){
  tab=tab||'tablero';
  const activos=NINOS.filter(n=>n.activo);
  const pres=activos.filter(n=>n.dias[HOY]==='P').length;
  const aus=activos.filter(n=>n.dias[HOY]==='A').length;
  const alertas=activos.filter(n=>diasConsec(n)>=2).length;
  const bajas=NINOS.filter(n=>!n.activo).length;

  document.getElementById('main').innerHTML=`
    <div class="tabs">
      <button class="tab ${tab==='tablero'?'on':''}" onclick="renderAdmin('tablero')">📈 Tablero</button>
      <button class="tab ${tab==='asist'?'on':''}" onclick="renderAdmin('asist')">📋 Asistencia</button>
      <button class="tab ${tab==='alertas'?'on':''}" onclick="renderAdmin('alertas')">⚡ Alertas${alertas>0?` <span style="background:var(--r);color:#fff;border-radius:99px;padding:0 5px;font-size:10px">${alertas}</span>`:''}</button>
      <button class="tab ${tab==='nomina'?'on':''}" onclick="renderAdmin('nomina')">👥 Nómina</button>
      <button class="tab ${tab==='vacantes'?'on':''}" onclick="renderAdmin('vacantes')">🏠 Vacantes</button>
      <button class="tab ${tab==='bajas'?'on':''}" onclick="renderAdmin('bajas')">📤 Egresos</button>
      <button class="tab ${tab==='contactos'?'on':''}" onclick="renderAdmin('contactos')">📱 Contactos</button>
    </div>
    <div id="tb"></div>
  `;
  if(tab==='tablero') admTablero(activos,pres,aus,alertas,bajas);
  else if(tab==='asist') admAsist();
  else if(tab==='alertas') admAlertas();
  else if(tab==='nomina') admNomina();
  else if(tab==='vacantes') admVacantes();
  else if(tab==='bajas') admBajas();
  else if(tab==='contactos') admContactos();
}

function admTablero(activos,pres,aus,alertas,bajas){
  const total=activos.length;
  const pctH=total?Math.round(pres/total*100):0;

  // Topes por sala
  const topesHtml=[0,1,2,3].map(s=>{
    const nn=activos.filter(n=>n.sala===s);
    const p=nn.filter(n=>n.dias[HOY]==='P').length;
    const a=nn.filter(n=>n.dias[HOY]==='A').length;
    const m=nn.filter(n=>n.dias[HOY]==='M').length;
    const tope=TOPES[s];
    const pctTope=Math.round(nn.length/tope*100);
    const pctPres=nn.length?Math.round(p/nn.length*100):0;
    const cerr=nn.every(n=>n.dias[HOY]);
    const col=pctPres>=70?'var(--g)':pctPres>=50?'var(--a)':'var(--r)';
    return `<div class="sc">
      <div class="sh2"><span>ECO ${s}</span><span class="bx ${cerr?'bg':'ba'}">${cerr?'✓ Cerrada':'Pendiente'}</span></div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:4px">Vacantes: ${nn.length}/${tope}</div>
      <div class="tope-row" style="margin-bottom:4px">
        <div class="tope-track"><div class="tope-fill" style="width:${pctTope}%;background:${pctTope>=90?'var(--r)':pctTope>=75?'var(--a)':'var(--g)'}"></div></div>
        <div class="tope-nums" style="color:${pctTope>=90?'var(--r)':pctTope>=75?'var(--a)':'var(--g)'}">${nn.length}/${tope}</div>
      </div>
      <div class="sb"><div class="sf" style="width:${pctPres}%;background:${col}"></div></div>
      <div class="sn2">
        <span style="color:var(--g)">P: ${p}</span>
        <span style="color:var(--r)">A: ${a}</span>
        <span style="color:var(--pu)">M: ${m}</span>
        <span style="color:var(--tx2);font-family:var(--fm)">${pctPres}%</span>
      </div>
    </div>`;
  }).join('');

  // Focalización
  const estados={};
  activos.forEach(n=>{const e=n.est_asist||'Sin dato';estados[e]=(estados[e]||0)+1;});
  const focHtml=Object.entries(estados).sort((a,b)=>b[1]-a[1]).map(([e,c])=>{
    const pct=Math.round(c/total*100);
    return `<div class="pulse-bar" style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:12px;font-weight:600;min-width:90px;color:var(--tx2)">${e}</div>
      <div style="flex:1;height:7px;background:var(--s2);border-radius:3px;overflow:hidden">
        <div style="height:100%;border-radius:3px;background:var(--g);width:${pct}%"></div>
      </div>
      <div style="font-size:12px;font-weight:700;min-width:40px;text-align:right">${c}</div>
    </div>`;
  }).join('');

  document.getElementById('tb').innerHTML=`
    <div style="margin-bottom:.5rem">
      <div style="font-size:16px;font-weight:700">${hoyLabel()}</div>
    </div>
    <div class="mx">
      <div class="mc"><div class="mv mb">${total}</div><div class="ml">Inscriptos</div></div>
      <div class="mc"><div class="mv mg">${pres}</div><div class="ml">Presentes</div></div>
      <div class="mc"><div class="mv mr">${aus}</div><div class="ml">Ausentes</div></div>
      <div class="mc"><div class="mv ma">${alertas}</div><div class="ml">En alerta</div></div>
      <div class="mc"><div class="mv mpu">${bajas}</div><div class="ml">Bajas</div></div>
    </div>

    <div class="st">Estado de salas y topes</div>
    <div class="sg">${topesHtml}</div>

    <div class="card">
      <div class="st">Focalización — Estado de asistencia</div>
      ${focHtml}
    </div>

    <div class="card cf">
      <div class="ch"><div class="st" style="margin:0">Últimos llamados</div></div>
      ${NINOS.flatMap(n=>(n.llamados||[]).map(l=>({...l,ap:n.ap,nb:n.nb,sala:n.sala}))).sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8).map(l=>`
        <div style="display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd);gap:9px">
          <div style="font-size:11px;font-family:var(--fm);color:var(--tx3);flex-shrink:0;min-width:70px">${l.fecha}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.ap}</div>
            <div style="font-size:11px;color:var(--tx2)">${l.motivo||''} · ${l.obs||''}</div>
          </div>
          <span class="bx bn">${l.resultado||'—'}</span>
        </div>`).join('')||'<div class="empty">Sin llamados recientes</div>'}
    </div>
  `;
}

function admAsist(){
  let html='<div class="srch"><input type="text" id="sa-q" placeholder="Buscar..." oninput="filtAdm(this.value)"></div>';
  [0,1,2,3].forEach(s=>{
    html+=`<div class="st">Sala ECO ${s}</div><div class="card cf" id="sala-${s}" style="margin-bottom:1rem">${renderSalaAdm(s,'')}</div>`;
  });
  document.getElementById('tb').innerHTML=html;
}
function filtAdm(q){[0,1,2,3].forEach(s=>{const el=document.getElementById(`sala-${s}`);if(el)el.innerHTML=renderSalaAdm(s,q);});}
function renderSalaAdm(s,q){
  let nn=NINOS.filter(n=>n.sala===s&&n.activo);
  if(q) nn=nn.filter(n=>(n.ap+' '+n.nb).toLowerCase().includes(q.toLowerCase()));
  if(!nn.length) return '<div class="empty">Sin resultados</div>';
  return nn.map(n=>{
    const v=n.dias[HOY],dc=diasConsec(n);
    const ini=((n.ap[0]||'')+(n.nb[0]||'')).toUpperCase();
    return `<div class="nr" onclick="abrirFicha(${n.id})">
      <div class="av av-b">${ini}</div>
      <div class="ni"><div class="na">${n.ap}</div><div class="nn">${n.nb}</div></div>
      ${dc>=2?`<span class="bx br">⚡${dc}d</span>`:''}
      <span class="bx ${v==='P'?'bg':v==='A'?'br':'bn'}">${v||'—'}</span>

function diasConsec(n){
  const hi=generarDias().indexOf(HOY);
  if(hi<0) return 0;
  let c=0;
  const dias=generarDias();
  for(let i=hi;i>=0;i--){
    const v=n.dias[dias[i]];
    if(v==='A'||v==='M') c++;
    else if(v==='P') break;
    else if(dias[i]<HOY) break;
  }
  return c;
}

function generarDias(n=14){
  const dias=[],hoy=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(hoy);d.setDate(hoy.getDate()-i);
    if(d.getDay()!==0&&d.getDay()!==6) dias.push(d.toISOString().slice(0,10));
  }
  return dias;
}

function ultDias(n,cant){
  return generarDias(cant*2).slice(-cant).map(d=>[d,n.dias[d]||'']);
}

function marcarNino(id,val){
  if(cerrada) return;

function marcarMer(id){
  if(cerrada) return;

async function cerrarAsistencia(sala){
  const nn=NINOS.filter(n=>n.sala===sala&&n.activo);
  const sinM=nn.filter(n=>!n.dias[HOY]);
  if(sinM.length>0){showToast(`Faltan ${sinM.length} sin marcar`);return;}
  nn.filter(n=>n.dias[HOY]==='A'||n.dias[HOY]==='M').forEach(n=>{
    if(!n.llamados) n.llamados=[];
    const ya=n.llamados.find(l=>l.fecha===HOY&&l.motivo==='Sin contacto');
    if(!ya) n.llamados.unshift({fecha:HOY,quien:cu.label,motivo:'Sin contacto',obs:'Registrado al cerrar asistencia',resultado:''});
  });
  alertasHoy=nn.filter(n=>diasConsec(n)>=2);
  cerrada=true;
  const registros=nn.map(n=>({nid:n.id,ap:n.ap,nb:n.nb,estado:n.dias[HOY],mer:n.mer&&n.mer[HOY]?'S':''}));
  const datos=encodeURIComponent(JSON.stringify(registros));
  await api('saveAsist',{fecha:HOY,sala,cargo:cu.label,datos});
  showToast(alertasHoy.length>0?`Guardado ✓ · ${alertasHoy.length} alerta${alertasHoy.length!==1?'s':''}`: 'Asistencia guardada ✓');
  renderMaestra();
}

function mkEnv(nid){
  waEnviados[nid]=true;
  if(!waRespuestas[nid]) waRespuestas[nid]={texto:'',nota:''};
  const n=NINOS.find(x=>x.id===nid);
  if(n) api('saveWA',{fecha:HOY,ap:n.ap,nb:n.nb,sala:n.sala,cel:n.cel,cargo:cu.label});
  showToast('✓ WA enviado — registrá la respuesta cuando llegue');
  setTimeout(()=>{renderMaestra();},600);
}
function registrarRespWA(nid,texto){
  if(!waRespuestas[nid]) waRespuestas[nid]={texto:'',nota:''};
  waRespuestas[nid].texto = waRespuestas[nid].texto===texto?'':texto; // toggle
  // Guardar como llamado automáticamente
  const n=NINOS.find(x=>x.id===nid);
  if(n&&waRespuestas[nid].texto){
    if(!n.llamados) n.llamados=[];
    const ya=n.llamados.find(l=>l.fecha===HOY&&l.motivo==='Respuesta WA');
    if(ya) ya.obs=waRespuestas[nid].texto+(waRespuestas[nid].nota?' · '+waRespuestas[nid].nota:'');
    else n.llamados.unshift({fecha:HOY,quien:cu.label,motivo:'Respuesta WA',obs:waRespuestas[nid].texto,resultado:waRespuestas[nid].texto});
    api('saveInasist',{fecha:HOY,hora:new Date().toTimeString().slice(0,5),ap:n.ap,nb:n.nb,sala:n.sala,motivo:'Respuesta WA',obs:waRespuestas[nid].texto,fam:'',cargo:cu.label});
  }
  renderMaestra();
}
function guardarNotaWA(nid,nota){
  if(!waRespuestas[nid]) waRespuestas[nid]={texto:'',nota:''};
  waRespuestas[nid].nota=nota;
  const n=NINOS.find(x=>x.id===nid);
  if(n&&n.llamados&&n.llamados[0]?.motivo==='Respuesta WA') n.llamados[0].obs=(waRespuestas[nid].texto||'')+(nota?' · '+nota:'');
}

function genMsg(n,dias){
  const fam=n.fam_nb?n.fam_nb.split(' ')[0]:(n.fam_ap?n.fam_ap.split(' ')[0]:'familia');
  const nb=n.nb.split(' ')[0];
  if(dias>=3) return `Hola ${fam} 👋 Te contactamos desde el CPI Norte.\n\nLlevamos ${dias} días sin ver a ${nb} y nos preocupa su bienestar. ¿Están bien? ¿Necesitan algo de nuestra parte?\n\nCualquier novedad nos avisás por acá. Estamos para acompañarlos 🌟`;
  return `Hola ${fam} 👋 Te escribimos desde el CPI Norte.\n\nVimos que ${nb} no vino en los últimos días y queríamos saber cómo están. ¿Todo bien?\n\nNos contás por acá cuando puedas 😊`;
}

function calcEdad(fnac){
  if(!fnac) return '—';
  const n=new Date(fnac),h=new Date();
  let m=h.getMonth()-n.getMonth()+(h.getFullYear()-n.getFullYear())*12;
  if(m<24) return `${m} meses`;
  return `${Math.floor(m/12)} años`;
}
function estadoCls(e){
  const m={'INSCRIPTX':'bg','EN ESPERA':'bb','BAJA':'br','ALARMA':'br','Dar Baja':'ba'};
  return m[e]||'bn';
}
function estadoAsistCls(e){
  const m={'Asiste':'bg','Va a venir':'bb','Dar Baja':'br','Alarma':'br','Una vez':'ba','No asiste':'br'};
  return m[e]||'bn';
}
